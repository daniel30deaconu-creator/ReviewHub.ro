<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewHub.ro | Kenmore Intuition Review</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; margin: 0; }
        .product-card {
            background: white;
            max-width: 550px;
            margin: 30px auto;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #eef0f2;
        }
        .badge { background: #2e7d32; color: white; padding: 8px 15px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; text-align: center; }
        
        /* Stil pentru poze */
        .main-img { width: 100%; height: auto; display: block; }
        .secondary-img { 
            width: 90%; 
            margin: 10px auto; 
            display: block; 
            border-radius: 10px; 
            border: 1px solid #ddd;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .img-label { text-align: center; font-size: 0.8rem; color: #777; margin-bottom: 10px; font-style: italic; }

        .content { padding: 25px; }
        .product-title { font-size: 1.6rem; color: #1a1a1a; margin-bottom: 15px; line-height: 1.2; font-weight: 800; }
        
        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
            padding: 15px;
            background: #f1f8f1;
            border-radius: 12px;
        }
        .spec-item { font-size: 0.85rem; color: #3d5a80; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        .description-text { font-size: 0.95rem; color: #4a4a4a; line-height: 1.6; margin-bottom: 25px; }
        .description-text strong { color: #2e7d32; }

        .btn-amazon {
            display: block;
            background: linear-gradient(90deg, #ff9900, #ffb347);
            color: #232f3e;
            text-align: center;
            padding: 18px;
            text-decoration: none;
            font-weight: 800;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3);
        }
        .btn-amazon:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255, 153, 0, 0.4); }
    </style>
</head>
